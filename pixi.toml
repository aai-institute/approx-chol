[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "win-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.11"
pixi-pycharm = ">=0.0.10,<0.0.11"
cargo-audit = ">=0.22.1,<0.23"

[pypi-dependencies]
approx-chol = { path = ".", editable = true }

[feature.build.dependencies]
rust = ">=1.75"
maturin = ">=1.7"

[feature.dev.dependencies]
pytest = ">=7.0"
pytest-cov = "*"
cargo-llvm-cov = ">=0.8.4,<0.9"

[feature.compare.dependencies]
juliaup = ">=1.19,<1.20"

[environments]
default = { features = ["build", "dev"], solve-group = "default" }
compare = { features = ["build", "dev", "compare"], solve-group = "default" }

[tasks]
test = "maturin develop --uv && pytest tests/ -v"
develop = "maturin develop --uv --release"
bench-smoke = "cargo bench -p approx-chol --bench smoke -- --sample-size 10 --warm-up-time 0.05 --measurement-time 0.1"
coverage = "./scripts/coverage-with-python.sh"
coverage-rust = "cargo llvm-cov --workspace --all-features --summary-only"
compare-native = "./scripts/compare_native.sh"
